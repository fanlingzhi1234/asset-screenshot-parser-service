services:
  parser:
    container_name: asset-screenshot-parser-service
    build:
      context: .
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-mirror.gcr.io/library/python:3.11-slim}
    env_file:
      - path: .env
        required: false
    ports:
      - "${APP_PORT:-8010}:8010"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
